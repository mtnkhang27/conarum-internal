_schema-version: 3.3.0
ID: conarum-prediction
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # ──────────────── CAP Backend ────────────────
  - name: conarum-prediction-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
    build-parameters:
      builder: npm
      ignore:
        - "node_modules/"
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: conarum-prediction-auth
      - name: conarum-prediction-db

  # ──────────────── HANA DB Deployer ────────────────
  - name: conarum-prediction-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: conarum-prediction-db

  # ──────────────── Standalone Approuter ────────────────
  - name: conarum-prediction-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      instances: 1
      memory: 256M
      disk-quota: 512M
    requires:
      - name: conarum-prediction-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    build-parameters:
      ignore:
        - "node_modules/"
      requires:
        - name: conarum-prediction-ui
          artifacts:
            - ./*
          target-path: resources

  # ──────────────── React Frontend Build ────────────────
  - name: conarum-prediction-ui
    type: html5
    path: app/internal-sport
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []
      build-result: dist

resources:
  # ──────────────── XSUAA ────────────────
  - name: conarum-prediction-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: conarum-prediction-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"

  # ──────────────── HANA HDI Container ────────────────
  - name: conarum-prediction-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
